name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements.txt
          sudo apt-get update
          sudo apt-get install --yes poppler-utils
      - name: Validate and package
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SKILL_VERSION="$(python -c 'import sys; sys.path.insert(0, "skills/build-apex-brand-reports/scripts"); from _kit import SKILL_VERSION; print(SKILL_VERSION)')"
          test "${VERSION}" = "${SKILL_VERSION}"
          ARTIFACT="build-apex-brand-reports-${VERSION}.zip"
          python -m unittest discover -s tests -v
          python skills/build-apex-brand-reports/scripts/package_skill.py --output "dist/${ARTIFACT}"
          (cd dist && shasum -a 256 "${ARTIFACT}" > SHA256SUMS)
          echo "artifact=${ARTIFACT}" >> "${GITHUB_OUTPUT}"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" "dist/${{ steps.package.outputs.artifact }}" dist/SHA256SUMS --title "${GITHUB_REF_NAME}" --generate-notes --verify-tag
