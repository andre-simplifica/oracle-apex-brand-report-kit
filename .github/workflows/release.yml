name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements.txt
          sudo apt-get update
          sudo apt-get install --yes poppler-utils
      - name: Validate and package
        run: |
          python -m unittest discover -s tests -v
          python skills/build-apex-brand-reports/scripts/package_skill.py --output dist/build-apex-brand-reports-0.1.0.zip
          cd dist
          shasum -a 256 build-apex-brand-reports-0.1.0.zip > SHA256SUMS
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/build-apex-brand-reports-0.1.0.zip dist/SHA256SUMS --title "${GITHUB_REF_NAME}" --generate-notes --verify-tag
