name: Bug report
description: Report a reproducible problem using synthetic data
title: "[Bug]: "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.1
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Do not include credentials, private URLs, production data, or customer assets.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Synthetic reproduction
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Confirmed environment and validation evidence
